services:
  frontend:
    image: nginx:1.19
    container_name: containers07-frontend
    depends_on:
      - backend
    env_file:
      - app.env
    volumes:
      - ./mounts/site:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - internal

  backend:
    build:
      context: ./backend
    container_name: containers07-backend
    depends_on:
      - database
    env_file:
      - mysql.env
      - app.env
    volumes:
      - ./mounts/site:/var/www/html
    networks:
      - internal

  database:
    image: mysql:8.0
    container_name: containers07-database
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - mysql.env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

networks:
  internal: {}

volumes:
  db_data: {}
